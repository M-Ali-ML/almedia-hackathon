# Answer key for the SAMPLE dossier only (data/Uebungsdaten_Muster_Verpackungen.zip).
# Derived from data/info.md; every identifier below was verified against the
# ingested DuckDB of the sample batch.
#
# HARD RULE: this file exists for scoring in scripts/eval.py ONLY.
# It must NEVER be read by, embedded in, or referenced from any agent prompt,
# global context, tool output, or check implementation. Judging day uses a
# different dossier with a regenerated scheme set — leaking this key into the
# pipeline would only overfit the sample and teach nothing.
#
# Matching semantics (see scripts/eval.py):
#   A finding "detects" a scheme if any term in `match_any` occurs as a
#   case-insensitive substring of the finding's title, description, or
#   citation fields (file, table, sheet, passage, excerpt).
#   A decoy is "flagged" (penalty) if a finding that matches NO scheme
#   mentions any of the decoy's terms.

schemes:
  - id: F1
    title: "Fake vendor Ratio Consulting GmbH — cash misappropriation"
    amount_eur: 248000
    # Shell vendor 209101, created+approved by MV-U05, 5 round Beratung
    # invoices, no goods receipts.
